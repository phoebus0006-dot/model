services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: modelwiki_test
      POSTGRES_USER: modelwiki_test
      POSTGRES_PASSWORD: test_only_do_not_use_in_production
    ports:
      - "55432:5432"
    volumes:
      - pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelwiki_test -d modelwiki_test"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs: /var/lib/postgresql/data

volumes:
  pg_test_data:
