# ModelWiki CI — contract section 15 & Phase 3 remediation requirements.
# Uses DISPOSABLE PostgreSQL + Redis service containers (never production).
# No continue-on-error: any failing step fails the build (contract section 8).
# CI environment: PostgreSQL 16, Redis 7, PHP 8.3, Python 3.12, Node.js 22.
name: CI

on:
  push:
    branches: [main, "repair/**", "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mw-backend

jobs:
  gate:
    name: QA Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Disposable services — contract section 5.
    # NEVER uses production credentials.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mwtest
          POSTGRES_PASSWORD: mwtest
          POSTGRES_DB: mwtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mwtest -d mwtest"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mwtest:mwtest@localhost:5432/mwtest
      REDIS_URL: redis://localhost:6379
      USER_JWT_SECRET: ci-user-jwt-secret-at-least-32-characters-long
      ADMIN_JWT_SECRET: ci-admin-jwt-secret-at-least-32-characters-long
      JWT_SECRET: ci-user-jwt-secret-at-least-32-characters-long
      REVIEW_CACHE_SIGNING_SECRET: ci-review-signing-secret-32-chars-min
      NODE_OPTIONS: --max-old-space-size=4096
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mw-backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      # 1. Install dependencies (frozen, single lockfile)
      - name: Install dependencies (npm ci)
        run: npm ci

      # 2. Prisma generate
      - name: Prisma generate
        run: npx prisma generate

      # 3. Prisma validate
      - name: Prisma validate
        run: npm run prisma:validate

      # 4. Prisma migrate deploy (disposable DB)
      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      # 5. Typecheck
      - name: Typecheck
        run: npm run typecheck

      # 6. Build
      - name: Build
        run: npm run build

      # 7. Lint
      - name: Lint
        run: npm run lint

      # 8. Unit tests
      - name: Unit tests
        run: npm run test:unit

      # 9. Mock route tests
      - name: Mock route tests
        run: npm run test:route

      # 10. Mock integration tests
      - name: Mock integration tests
        run: npm run test:mock-integration

      # 11. Wave 2 integration tests
      - name: Wave 2 integration tests
        run: npm run test:wave2

      # 12. Smoke tests
      - name: Smoke tests
        run: npm run test:smoke

      # 13. Real integration tests (real PG + Redis)
      - name: Real integration tests
        run: npm run test:integration

      # 14. Migration tests
      - name: Migration tests
        run: npm run test:migration

      # 15. Admin JS check
      - name: Admin JS check
        run: npm run admin-js-check

      # 16. PHP syntax check
      - name: PHP syntax check
        working-directory: .
        run: |
          fail=0
          while IFS= read -r f; do
            if ! php -l "$f" >/dev/null 2>&1; then
              echo "FAIL: $f"
              php -l "$f"
              fail=1
            fi
          done < <(find modelwiki-theme -name '*.php' -not -path '*/vendor/*')
          if [ -f guanli_index.php ]; then
            if ! php -l guanli_index.php >/dev/null 2>&1; then
              echo "FAIL: guanli_index.php"
              php -l guanli_index.php
              fail=1
            fi
          fi
          exit $fail

      # 17. Python tests
      - name: Python tests
        working-directory: .
        run: |
          pip install pytest -q
          python -m pytest test_crawler_state.py --tb=line -q
          fail=0
          for f in nas_crawler_agent.py mfc_batch_scraper.py; do
            if [ -f "$f" ]; then
              python -m py_compile "$f" || fail=1
            fi
          done
          find modelwiki-theme/tests -name '*.py' -not -path '*/vendor/*' 2>/dev/null | while read -r f; do
            python -m py_compile "$f" || exit 1
          done || fail=1
          exit $fail

      # 18. Secret scan
      - name: Secret scan
        working-directory: .
        run: |
          set +e
          hits=0
          patterns=(
            'AKIA[0-9A-Z]{16}'
            'sk-[a-zA-Z0-9]{20,}'
            'ghp_[a-zA-Z0-9]{36}'
            '-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          )
          for pat in "${patterns[@]}"; do
            match=$(grep -rEn --include='*.ts' --include='*.js' --include='*.mjs' \
              --include='*.sql' --include='*.prisma' --include='*.php' \
              --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.git \
              --exclude='*.test.ts' --exclude='package-lock.json' \
              "$pat" mw-backend/src mw-backend/prisma modelwiki-theme 2>/dev/null)
            if [ -n "$match" ]; then
              echo "SECRET HIT ($pat):"
              echo "$match"
              hits=$((hits+1))
            fi
          done
          pwd_match=$(grep -rEn --include='*.ts' --include='*.js' --include='*.php' \
            --exclude-dir=node_modules --exclude-dir=dist \
            --exclude='*.test.ts' --exclude='env.example' \
            'password\s*=\s*["'\''][^"'\'']{8,}["'\'']' \
            mw-backend/src modelwiki-theme 2>/dev/null)
          if [ -n "$pwd_match" ]; then
            echo "SECRET HIT (hardcoded password):"
            echo "$pwd_match"
            hits=$((hits+1))
          fi
          if [ "$hits" -gt 0 ]; then
            echo "::error::$hits secret pattern(s) found"
            exit 1
          fi
          echo "No secrets found."

      # 19. Full gate (runs all gates, generates manifest)
      - name: Full QA gate
        run: |
          npm run gate
          cp test-manifest.json "${{ runner.temp }}/modelwiki-test-manifest.json"

      # 20. Upload test manifest (CI artifact, NOT source code)
      - name: Upload test manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-manifest
          path: ${{ runner.temp }}/modelwiki-test-manifest.json
