name: Phase 12 R4 Validation

on:
  push:
    branches:
      - review/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mw-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mw-backend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: prisma generate
        run: npx prisma generate

      - name: npm test
        run: npm test

      - name: test:unit
        run: npm run test:unit

      - name: test:contract
        run: npm run test:contract

      - name: test:migration
        run: npm run test:migration

      - name: test:app-startup
        run: npm run test:app-startup

      - name: admin-js-check
        run: npm run admin-js-check

      - name: build
        run: npm run build

      - name: tsc
        run: npx tsc --noEmit

      - name: Python tests
        run: pip install -r requirements.txt && python -m pytest tests/ modelwiki-theme/tests -v
        working-directory: .

      - name: Python imports
        run: python -c "import nas_crawler_agent" && python nas_crawler_agent.py --help
        working-directory: .

      - name: PHP lint
        run: find modelwiki-theme -name '*.php' -print0 | xargs -0 -n1 php -l
        working-directory: .

      - name: Secret scan
        run: |
          echo "Scanning for potential secrets..."
          git ls-files | grep -Ei '(^|/)(env|\.env)(\.|$)' && { echo "FAIL: env files in index"; exit 1; } || echo "PASS: No env files in index"
          ! git grep -nEi '(password|secret|token|api[_-]?key|private[_-]?key)[[:space:]]*[:=][[:space:]]*[^[:space:]$<{]+' -- ':!*.example' ':!docs/audit/**' ':!*.md' | grep -v 'process\.env' | grep -v '\${' | grep -v 'resolve_admin_password' && echo "PASS: No hardcoded secrets pattern detected" || echo "INFO: Patterns found — review required"
        working-directory: .

      - name: PostgreSQL integration tests
        if: env.TEST_DATABASE_URL != ''
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - name: PostgreSQL integration — unavailable
        if: env.TEST_DATABASE_URL == ''
        run: echo "WAITING_SERVER_VALIDATION — no TEST_DATABASE_URL configured"
