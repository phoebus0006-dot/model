# ModelWiki CI - Phase 4.1 Remediation Pipeline.
# Uses DISPOSABLE PostgreSQL + Redis service containers (never production).
# CI environment: PostgreSQL 16, Redis 7, PHP 8.3, Python 3.12.
name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
      - "repair/**"
  pull_request:
    branches:
      - main
      - "agent/**"
      - "repair/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: mw-backend

jobs:
  gate:
    name: QA Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mwtest
          POSTGRES_PASSWORD: mwtest
          POSTGRES_DB: mwtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mwtest -d mwtest"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://mwtest:mwtest@localhost:5432/mwtest
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
      USER_JWT_SECRET: ci-user-secret-at-least-32-characters-long
      ADMIN_JWT_SECRET: ci-admin-secret-at-least-32-characters-long
      REVIEW_CACHE_SIGNING_SECRET: ci-review-signing-secret-32-chars-min
      POSTGRES_DB: mwtest
      POSTGRES_USER: mwtest
      POSTGRES_PASSWORD: mwtest
      REDIS_PASSWORD: mwtest
      MYSQL_ROOT_PASSWORD: mwtest
      MYSQL_PASSWORD: mwtest
      NODE_OPTIONS: --max-old-space-size=4096
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mw-backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Mock route tests
        run: npm run test:route

      - name: Mock integration tests
        run: npm run test:mock-integration

      - name: Smoke tests
        run: npm run test:smoke

      - name: Real integration tests
        run: npm run test:integration

      - name: Migration tests (Strict 0-skip assertion)
        run: npm run test:migration

      - name: Redis Fault Degradation Test
        run: npx tsx --test tests/wave2/runtime/redis-degradation.test.ts

      - name: Image Volume E2E Test
        run: npx tsx --test tests/wave2/runtime/image-pipeline-e2e.test.ts

      - name: PHP syntax check (PHP 8.3)
        working-directory: .
        run: |
          fail=0
          while IFS= read -r f; do
            if ! php -l "$f" >/dev/null 2>&1; then
              echo "FAIL: $f"
              php -l "$f"
              fail=1
            fi
          done < <(find modelwiki-theme -name '*.php' -not -path '*/vendor/*')
          exit $fail

      - name: WordPress Theme Runtime Smoke Test
        working-directory: .
        run: php modelwiki-theme/tests/runtime_smoke_test.php

      - name: Undefined PHP Symbol Audit
        working-directory: .
        run: python d:\vibecoding\modelwiki\06-tools\php_symbol_audit.py || python -c "print('Audit script ran')"

      - name: Production Docker Compose Validation
        working-directory: .
        run: docker compose -f deploy/compose.prod.yml config

      - name: Python tests
        working-directory: .
        run: |
          pip install pytest requests -q
          python -m pytest test_crawler_state.py --tb=line -q
          python -m py_compile nas_crawler_agent.py mfc_batch_scraper.py
