# ModelWiki Full Production Stack (Option A)
# Complete production stack including API, Postgres, Redis, WordPress, MySQL, imgproxy, and volumes.
name: modelwiki-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: modelwiki-prod-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mw-backend

  redis:
    image: redis:7-alpine
    container_name: modelwiki-prod-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mw-backend

  migrate:
    build:
      context: ../mw-backend
      dockerfile: Dockerfile
    container_name: modelwiki-prod-migrate
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mw-backend

  api:
    build:
      context: ../mw-backend
      dockerfile: Dockerfile
    container_name: modelwiki-prod-api
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      ASSETS_PATH: /app/assets
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      USER_JWT_SECRET: ${USER_JWT_SECRET:?USER_JWT_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REVIEW_CACHE_SIGNING_SECRET: ${REVIEW_CACHE_SIGNING_SECRET:?REVIEW_CACHE_SIGNING_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://www.phoebusstudio.com}
      ENABLE_PUBLIC_REGISTRATION: ${ENABLE_PUBLIC_REGISTRATION:-true}
      SITE_URL: ${SITE_URL:-https://www.phoebusstudio.com}
    volumes:
      - figure_assets:/app/assets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mw-backend
      - mw-frontend

  mysql:
    image: mysql:8.0
    container_name: modelwiki-prod-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DB:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-modelwiki}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mw-backend

  wordpress:
    image: wordpress:6-php8.2-fpm-alpine
    container_name: modelwiki-prod-wordpress
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: ${MYSQL_USER:-modelwiki}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      WORDPRESS_DB_NAME: ${MYSQL_DB:-wordpress}
      WORDPRESS_TABLE_PREFIX: wp_
      MW_API_URL: http://api:3000/api/v1
    volumes:
      - wp_data:/var/www/html
      - ../modelwiki-theme:/var/www/html/wp-content/themes/modelwiki:ro
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - mw-backend
      - mw-frontend

  imgproxy:
    image: darthsim/imgproxy:v3
    container_name: modelwiki-prod-imgproxy
    restart: always
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /var/www/html
      IMGPROXY_MAX_SRC_RESOLUTION: 20
      IMGPROXY_ENABLE_AVIF_DETECTION: "true"
      IMGPROXY_BASE_URL: /wp-content/uploads/
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - wp_data:/var/www/html:ro
    networks:
      - mw-frontend

networks:
  mw-frontend:
    driver: bridge
  mw-backend:
    driver: bridge

volumes:
  pg_data:
    external: false
  redis_data:
    external: false
  mysql_data:
    external: false
  wp_data:
    external: false
  figure_assets:
    external: false
