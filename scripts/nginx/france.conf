proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=wiki:200m max_size=10g inactive=7d use_temp_path=off;
fastcgi_cache_path /var/cache/nginx/wp levels=1:2 keys_zone=WP:200m max_size=10g inactive=60m use_temp_path=off;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

upstream php_fpm {
    server wordpress:9000;
}

upstream api {
    server api:3000;
}

upstream imgproxy {
    server imgproxy:8080;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ ^/wp-admin/ {
        try_files $uri $uri/ /wp-admin/index.php?$args;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /wp-login.php {
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ \.php$ {
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        fastcgi_cache WP;
        fastcgi_cache_valid 200 301 302 24h;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
        fastcgi_cache_bypass $http_pragma $http_authorization $cookie_wordpress_logged_in;
        fastcgi_no_cache $http_pragma $http_authorization $cookie_wordpress_logged_in;
        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    location /api/ {
        proxy_cache wiki;
        proxy_cache_valid 200 5m;
        proxy_cache_methods GET HEAD;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://api;
    }

    location /img/ {
        proxy_cache wiki;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";

        proxy_set_header Host $host;
        proxy_pass http://imgproxy/;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. { deny all; }
    location ~ /wp-config\.php { deny all; }

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
