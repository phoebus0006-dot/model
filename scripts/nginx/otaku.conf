server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name otaku.phoebusatelier.com 141.253.114.69;

    root /var/lib/docker/volumes/docker_wp_data/_data;
    index index.php index.html;

    location /.well-known/acme-challenge/ {
        allow all;
        root /www/wwwroot/default;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /admin/ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index page-admin.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/wp-content/themes/modelwiki/page-admin.php;
        fastcgi_param MW_ADMIN_STANDALONE 1;
        include fastcgi_params;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
        fastcgi_connect_timeout 600s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }

    access_log /www/wwwlogs/otaku.phoebusatelier.com.log;
    error_log /www/wwwlogs/otaku.phoebusatelier.com.error.log;
}
